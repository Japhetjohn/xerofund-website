<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XeroFund</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            /* Allow scrolling by removing 100vh and overflow hidden restrictions */
            width: 100%;
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }

        .main-image {
            width: 100%; /* Make image take full width of container */
            height: auto; /* Maintain aspect ratio */
            display: block; /* Remove bottom space inside container */
        }
    </style>
</head>
<body>
    <!-- Use img tag instead of background for natural scaling and scrolling -->
    <img src="xerofund.jpeg" alt="XeroFund" class="main-image">
</body>
</html>
